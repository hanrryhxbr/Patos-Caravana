<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Stylesheet" href="cadastroComerciante.css">
    <title>Criar conta</title>

</head>

<body>

    <header>
        <div class="titulo">

            <h1>Patos Caravana</h1>

        </div>

    </header>

    <div class="slogan">
        <h2 class="subtitulo">
            Divulgue seus produtos e serviços para toda a cidade
        </h2>
    </div>

    <main>

        <form>

            <h3>

                Cadastre sua conta

            </h3>

            <div class="inputField">

                <label id="nome">Nome:</label><br>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome"><br><br>

            </div>

            <div class="inputField">

                <label id="email">Email:</label><br>
                <input type="email" name="email" id="email" placeholder="Digite seu Email"><br><br>

            </div>

            <div class="inputField">

                <label id="password">Senha:</label><br>
                <input type="password" name="password" id="password" placeholder="Digite sua senha"><br><br>

            </div>

            <div class="inputField">

                <label id="confirmarPassword">Confirme sua senha:</label><br>
                <input type="password" name="confirmarPassword" id="confirmarPassword"
                    placeholder="Digite sua senha"><br><br>

            </div>

            <div class="inputField">

                <label id="telefone">Telefone:</label><br>
                <input type="tel" name="telefone" id="telefone" placeholder="Digite seu telefone"><br><br>

            </div>

            <div class="inputField">

                <label id="cnpj">CNPJ:</label><br>
                <input type="text" name="cnpj" id="cnpj" placeholder="Digite seu CNPJ"><br><br>

            </div>

            <button type="button" onclick="window.location.href='../CLIENTE/paginaInicialCliente.html'">

                Criar Conta

            </button>


        </form>

    </main>

</body>

</html>
