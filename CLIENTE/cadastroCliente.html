<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Stylesheet" href="cadastroCliente.css">
    <title>Criar Conta</title>

</head>

<body>

    <header>
        <div class="titulo">

            <h1>Patos Caravana</h1>

        </div>

    </header>

    <div class="slogan">
        <h2 class="subtitulo">
            Conectando clientes e comerciantes em um só lugar
        </h2>
    </div>
    
    <main>

        <form>

            <h3>

                Cadastre sua conta

            </h3>

            <div class="inputField">

                <label id="nome">Nome:</label><br>
                <input
                    type="text" 
                    name="nome" 
                    id="nome"
                    placeholder="Digite seu nome" 
                    required><br><br>

            </div>

            <div class="inputField">

                <label id="email">Email:</label><br>
                <input 
                    type="email" 
                    name="email" 
                    id="email" 
                    placeholder="Digite seu Email"
                    required><br><br>
                
            </div>

            <div class="inputField">

                <label id="password">Senha:</label><br>
                <input 
                    type="password" 
                    name="password" 
                    id="password" 
                    placeholder="Digite sua senha"
                    required><br><br>
                
            </div>

            <div class="inputField">

                <label id="confirmarPassword">Confirme sua senha:</label><br>
                <input 
                    type="password" 
                    name="confirmarPassword" 
                    id="confirmarPassword" 
                    placeholder="Digite sua senha"
                    required><br><br>
                
            </div>

            <div class="inputField">

                <label id="telefone">Telefone:</label><br>
                <input 
                    type="tel" 
                    name="telefone"
                    id="telefone"
                    placeholder="Digite seu telefone" 
                    required><br><br>
                
            </div>

            <div class="inputField">

                <label id="interesse">Categoria de Interesse( opcional ):</label><br>
                <select name="categoria" id="interesse" required>

                    <option value="">Selecione</option>
                    <option value="alimentacao">Alimentação</option>
                    <option value="servicos">Serviços</option>
                    <option value="varejo">Varejo</option>

                </select><br><br>
                
            </div>

            <button type="submit">Criar Conta</button>  

        </form>

    </main>
    
</body>

</html>
